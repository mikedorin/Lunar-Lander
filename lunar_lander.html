<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Lunar Lander</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@600&display=swap');

  :root {
    --bg:       #0f1117;
    --surface:  #181c27;
    --border:   #2a3050;
    --text:     #d8dff0;       /* soft blue-white — high contrast on dark */
    --dim:      #6b7a99;
    --accent:   #7eb8f7;       /* sky blue accent */
    --warn:     #f0c060;
    --danger:   #f07060;
    --good:     #60d090;
    --stat-bg:  #141824;
    --mono:     'Share Tech Mono', 'Courier New', monospace;
    --display:  'Orbitron', monospace;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    min-height: 100vh;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    font-family: var(--mono);
    padding: 16px;
  }

  #app {
    width: 100%;
    max-width: 680px;
    display: flex;
    flex-direction: column;
    gap: 0;
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
    box-shadow: 0 0 40px rgba(126,184,247,0.06), 0 8px 32px rgba(0,0,0,0.6);
  }

  /* ── Header ── */
  #header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 12px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  #header-icon { font-size: 20px; }
  #header-title {
    font-family: var(--display);
    font-size: 13px;
    letter-spacing: 0.12em;
    color: var(--accent);
  }
  #header-sub {
    font-size: 11px;
    color: var(--dim);
    margin-left: auto;
    letter-spacing: 0.05em;
  }

  /* ── Stats bar ── */
  #stats {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    background: var(--stat-bg);
    border-bottom: 1px solid var(--border);
  }
  .stat {
    padding: 10px 8px;
    text-align: center;
    border-right: 1px solid var(--border);
  }
  .stat:last-child { border-right: none; }
  .stat-label {
    font-size: 9px;
    letter-spacing: 0.1em;
    color: var(--dim);
    text-transform: uppercase;
    margin-bottom: 4px;
  }
  .stat-val {
    font-family: var(--display);
    font-size: 13px;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .stat-val.warn  { color: var(--warn); }
  .stat-val.danger { color: var(--danger); }
  .stat-val.good  { color: var(--good); }

  /* ── Console output ── */
  #console {
    background: var(--bg);
    min-height: 300px;
    max-height: 45vh;
    overflow-y: auto;
    padding: 14px 16px 8px;
    font-size: 14px;
    line-height: 1.65;
    color: var(--text);
    font-weight: bold;
    scroll-behavior: smooth;
  }
  /* scrollbar */
  #console::-webkit-scrollbar { width: 4px; }
  #console::-webkit-scrollbar-track { background: transparent; }
  #console::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .row { white-space: pre-wrap; word-break: break-word; }
  .row.dim    { color: var(--dim); }
  .row.accent { color: var(--accent); }
  .row.warn   { color: var(--warn); }
  .row.danger { color: var(--danger); }
  .row.good   { color: var(--good); }
  .row.bold   { color: var(--text); font-weight: bold; }
  .row.system { color: var(--dim); font-size: 12px; }

  /* table rows */
  .row.table-head { color: var(--dim); border-bottom: 1px solid var(--border); padding-bottom: 2px; margin-bottom: 2px; }
  .row.table-data { color: var(--text); }

  /* ── Input area ── */
  #input-area {
    background: var(--surface);
    border-top: 1px solid var(--border);
    padding: 12px 14px;
  }

  #input-row {
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 8px 12px;
    transition: border-color 0.2s;
  }
  #input-row:focus-within { border-color: var(--accent); }

  #prompt {
    color: var(--accent);
    font-size: 13px;
    white-space: nowrap;
    user-select: none;
  }
  #burn-input {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: var(--text);
    font-family: var(--mono);
    font-size: 16px; /* 16px prevents iOS zoom */
    caret-color: var(--accent);
    min-width: 0;
  }
  #burn-input::placeholder { color: var(--dim); }

  .btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--dim);
    font-family: var(--mono);
    font-size: 12px;
    padding: 6px 14px;
    border-radius: 5px;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
    -webkit-tap-highlight-color: transparent;
  }
  .btn:hover, .btn:active { border-color: var(--accent); color: var(--accent); }
  .btn.primary { border-color: var(--accent); color: var(--accent); }
  .btn.primary:hover, .btn.primary:active { background: var(--accent); color: var(--bg); }

  #btn-row {
    display: flex;
    gap: 8px;
    margin-top: 10px;
    flex-wrap: wrap;
  }
  #restart-btn { display: none; }

  /* ── Mobile numpad ── */
  #numpad {
    display: none;
    grid-template-columns: repeat(3, 1fr);
    gap: 6px;
    margin-top: 10px;
  }
  .np-btn {
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: var(--mono);
    font-size: 18px;
    padding: 14px 8px;
    border-radius: 6px;
    cursor: pointer;
    text-align: center;
    transition: background 0.1s;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
  }
  .np-btn:active { background: var(--border); }
  .np-btn.wide { grid-column: span 2; }
  .np-btn.action { border-color: var(--accent); color: var(--accent); font-size: 14px; }
  .np-btn.action:active { background: var(--accent); color: var(--bg); }
  .np-btn.del { color: var(--warn); border-color: var(--border); }

  /* Show numpad on touch devices */
  @media (hover: none) and (pointer: coarse) {
    #numpad { display: grid; }
    #burn-input { font-size: 18px; }
  }

  /* ── Responsive ── */
  @media (max-width: 480px) {
    body { padding: 0; align-items: stretch; }
    #app { border-radius: 0; border-left: none; border-right: none; min-height: 100vh; }
    #console { max-height: 38vh; font-size: 13px; }
    #header-sub { display: none; }
    .stat-val { font-size: 11px; }
    #numpad { display: grid; }
  }
</style>
</head>
<body>
<div id="app">

  <!-- Header -->
  <div id="header">
    <span id="header-icon">🌕</span>
    <span id="header-title">LUNAR LANDER</span>
    <span id="header-sub">FOCAL/1969 · Apollo Simulation</span>
  </div>

  <!-- Stats bar -->
  <div id="stats">
    <div class="stat">
      <div class="stat-label">Altitude</div>
      <div class="stat-val" id="s-alt">120 mi</div>
    </div>
    <div class="stat">
      <div class="stat-label">Velocity</div>
      <div class="stat-val" id="s-vel">3600 mph</div>
    </div>
    <div class="stat">
      <div class="stat-label">Fuel</div>
      <div class="stat-val" id="s-fuel">16000 lb</div>
    </div>
    <div class="stat">
      <div class="stat-label">Time</div>
      <div class="stat-val" id="s-time">0 sec</div>
    </div>
  </div>

  <!-- Console -->
  <div id="console" aria-live="polite" aria-label="Game output"></div>

  <!-- Input -->
  <div id="input-area">
    <div id="input-row">
      <span id="prompt">K&gt;</span>
      <input id="burn-input" type="text" inputmode="numeric" pattern="[0-9]*"
             maxlength="3" autocomplete="off" spellcheck="false"
             placeholder="0 or 8–200"/>
    </div>
    <div id="btn-row">
      <button class="btn primary" id="enter-btn" onclick="submitBurn()">ENTER BURN RATE</button>
      <button class="btn" id="restart-btn" onclick="initGame()">↺ RESTART</button>
    </div>

    <!-- Touch numpad (auto-shown on mobile) -->
    <div id="numpad">
      <div class="np-btn" onclick="npPress('7')">7</div>
      <div class="np-btn" onclick="npPress('8')">8</div>
      <div class="np-btn" onclick="npPress('9')">9</div>
      <div class="np-btn" onclick="npPress('4')">4</div>
      <div class="np-btn" onclick="npPress('5')">5</div>
      <div class="np-btn" onclick="npPress('6')">6</div>
      <div class="np-btn" onclick="npPress('1')">1</div>
      <div class="np-btn" onclick="npPress('2')">2</div>
      <div class="np-btn" onclick="npPress('3')">3</div>
      <div class="np-btn del" onclick="npPress('del')">⌫</div>
      <div class="np-btn" onclick="npPress('0')">0</div>
      <div class="np-btn action" onclick="submitBurn()">SET K</div>
    </div>
  </div>

  <!-- Scoreboard -->
  <div id="scoreboard" style="
    background:#141824; border-top:1px solid #2a3050;
    padding:10px 16px; font-size:12px; color:#6b7a99;
    font-family:'Share Tech Mono',monospace; line-height:1.8;">
    🌍 Loading scoreboard...
  </div>

</div>
<script>
// ============================================================
// Physics ported from FOCAL-1969 LUNAR
// Units: miles, miles/sec, lbs, seconds
// V = downward-positive  |  A decreases as capsule falls
//
// Sub 9:  Q = S*K/M
//   J = V + G*S + Z*(-Q - Q²/2 - Q³/3 - Q⁴/4 - Q⁵/5)
//   I = A - G*S²/2 - V*S + Z*S*(Q/2+Q²/6+Q³/12+Q⁴/20+Q⁵/30)
// ============================================================
const WORKER_URL = 'https://wispy-fire-f45f.chaskiandroid.workers.dev';

async function loadScoreboard() {
  try {
    const res = await fetch(WORKER_URL + '/scores');
    const rows = await res.json();
    renderScoreboard(rows);
  } catch(e) {
    document.getElementById('scoreboard').textContent = '🌍 Scoreboard unavailable';
  }
}

async function recordOutcome(outcome) {
  try {
    const res = await fetch(WORKER_URL + '/scores', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ outcome })
    });
    const rows = await res.json();
    renderScoreboard(rows);
  } catch(e) { console.warn('Score record failed', e); }
}

function renderScoreboard(rows) {
  const data = {};
  rows.forEach(r => data[r.outcome] = r.count);
  const perfect = data.perfect||0, good = data.good||0, poor = data.poor||0;
  const damage  = data.damage||0,  oxygen = data.oxygen||0, crash = data.crash||0;
  const safe    = perfect + good;
  const total   = perfect + good + poor + damage + oxygen + crash;
  const pct     = total ? Math.round(safe/total*100) : 0;
  document.getElementById('scoreboard').innerHTML =
    '🌍 <b style="color:#d8dff0">' + total + '</b> pilots attempted &nbsp;·&nbsp; ' +
    '<span style="color:#60d090"><b>' + safe + '</b> safe (' + pct + '%)</span> &nbsp;·&nbsp; ' +
    '<span style="color:#f07060"><b>' + (total-safe) + '</b> crashes</span><br>' +
    '<span style="color:#6b7a99">★ perfect:' + perfect +
    '  ✓ good:' + good + '  ~ poor:' + poor +
    '  ! damage:' + damage + '  !! oxygen:' + oxygen +
    '  ✗ crater:' + crash + '</span>';
}

const G = 0.001, Z = 1.8, N = 16500;
let A, V, M, L, K, gameOver;

const con        = document.getElementById('console');
const burnInput  = document.getElementById('burn-input');
const enterBtn   = document.getElementById('enter-btn');
const restartBtn = document.getElementById('restart-btn');

// ── Output helpers ──────────────────────────────────────────
function out(text, cls) {
  const d = document.createElement('div');
  d.className = 'row' + (cls ? ' ' + cls : '');
  d.textContent = text;
  con.appendChild(d);
  con.scrollTop = con.scrollHeight;
}
function blank() { out(''); }
function hr() { out('─'.repeat(52), 'dim'); }

// ── Formatting ──────────────────────────────────────────────
function fmtAlt(a) {
  const mi = Math.max(0, Math.floor(a));
  const ft = Math.floor(5280 * Math.max(0, a - Math.floor(a)));
  return mi + ' mi  ' + ft + ' ft';
}
function mph(v)   { return (3600 * v).toFixed(1) + ' mph'; }
function fmtFuel(m) { return Math.max(0, Math.round(m - N)) + ' lbs'; }

// ── Stats bar ───────────────────────────────────────────────
function updateStats() {
  document.getElementById('s-alt').textContent = fmtAlt(A);

  const speed = 3600 * V;
  const velEl = document.getElementById('s-vel');
  velEl.textContent = speed.toFixed(0) + ' mph';
  velEl.className = 'stat-val' + (speed > 1000 ? ' danger' : speed > 300 ? ' warn' : ' good');

  const fuelEl = document.getElementById('s-fuel');
  const fuelLbs = Math.max(0, Math.round(M - N));
  fuelEl.textContent = fuelLbs.toLocaleString() + ' lb';
  fuelEl.className = 'stat-val' + (fuelLbs < 2000 ? ' danger' : fuelLbs < 5000 ? ' warn' : '');

  document.getElementById('s-time').textContent = Math.round(L) + ' s';
}

// ── Physics ─────────────────────────────────────────────────
function focalStep(a, v, m, k, s) {
  const Q = s * k / m;
  const Q2=Q*Q, Q3=Q*Q*Q, Q4=Q*Q*Q*Q, Q5=Q*Q*Q*Q*Q;
  const J = v + G*s + Z*(-Q - Q2/2 - Q3/3 - Q4/4 - Q5/5);
  const I = a - G*s*s/2 - v*s + Z*s*(Q/2 + Q2/6 + Q3/12 + Q4/20 + Q5/30);
  return {I, J};
}

// ── Init ────────────────────────────────────────────────────
function initGame() {
  A=120; V=1; M=32500; L=0; K=0; gameOver=false;
  con.innerHTML = '';
  restartBtn.style.display = 'none';
  enterBtn.style.display   = '';
  burnInput.disabled = false;
  burnInput.value    = '';
  document.getElementById('prompt').textContent = 'K>';

  out('CONTROL CALLING LUNAR MODULE. MANUAL CONTROL IS NECESSARY.');
  out('RESET FUEL RATE K EACH 10 SECS: 0 (FREE FALL) OR 8–200 LBS/SEC.');
  out('YOU HAVE 16,000 LBS FUEL.  CAPSULE WEIGHT: 32,500 LBS.');
  out('ESTIMATED FREE-FALL IMPACT TIME: 120 SECS.  GOOD LUCK.', 'accent');
  blank();
  out('FIRST RADAR CHECK COMING UP...', 'dim');
  blank();
  out('COMMENCE LANDING PROCEDURE', 'bold');
  blank();
  out('TIME      ALTITUDE              VELOCITY      FUEL         K', 'table-head');
  printStatus();
  updateStats();
}

function printStatus() {
  const t    = String(Math.round(L)).padEnd(9);
  const alt  = fmtAlt(A).padEnd(21);
  const vel  = mph(V).padEnd(13);
  const fuel = fmtFuel(M).padEnd(12);
  const k    = String(K);
  out(t + alt + vel + fuel + k, 'table-data');
}

// ── Landing outcome ─────────────────────────────────────────
function doLanding(vf, fuelLeft, tFinal) {
  const W = 3600 * vf;
  const outcomeKey = W <= 1  ? 'perfect'
                   : W <= 10 ? 'good'
                   : W <= 22 ? 'poor'
                   : W <= 40 ? 'damage'
                   : W <= 60 ? 'oxygen'
                   : 'crash';
  recordOutcome(outcomeKey);
  blank(); hr();
  out('TOUCHDOWN AT ' + tFinal.toFixed(1) + ' SECS', 'bold');
  out('IMPACT VELOCITY : ' + W.toFixed(2) + ' MPH', 'bold');
  out('FUEL REMAINING  : ' + Math.max(0,Math.round(fuelLeft)) + ' LBS', 'bold');
  blank();
  if      (W <= 1)  { out('★  PERFECT LANDING!  (LUCKY)', 'good'); }
  else if (W <= 10) { out('✓  GOOD LANDING  (COULD BE BETTER)', 'good'); }
  else if (W <= 22) { out('~  CONGRATULATIONS ON A POOR LANDING', 'warn'); }
  else if (W <= 40) { out('!  CRAFT DAMAGE.  GOOD LUCK.', 'warn'); }
  else if (W <= 60) { out('!!  CRASH LANDING — YOU\'VE 5 HRS OXYGEN', 'danger'); }
  else {
    out('✗  SORRY, NO SURVIVORS — YOU BLEW IT!', 'danger');
    out('   CRATER DEPTH: ' + (W * 0.277777).toFixed(1) + ' FT', 'danger');
  }
  blank();
  gameOver = true;
  burnInput.disabled = true;
  enterBtn.style.display = 'none';
  restartBtn.style.display = 'inline-block';
  document.getElementById('prompt').textContent = '';
  out('Press ↺ RESTART to play again.', 'dim');
  updateStats();
}

// ── Submit ───────────────────────────────────────────────────
function submitBurn() {
  if (gameOver) return;

  // Fuel out before we even process
  if (M - N < 0.001) {
    out('FUEL OUT AT ' + L.toFixed(1) + ' SECS', 'warn');
    const S = (-V + Math.sqrt(V*V + 2*A*G)) / G;
    L += S;
    doLanding(V + G*S, 0, L);
    return;
  }

  const raw = burnInput.value.trim();
  burnInput.value = '';
  const newK = parseFloat(raw);

  if (isNaN(newK) || (newK !== 0 && (newK < 8 || newK > 200))) {
    out('NOT POSSIBLE — enter 0 or a value between 8 and 200.', 'danger');
    blank();
    burnInput.focus();
    return;
  }
  K = newK;

  // Run 10-second turn
  let T = 10;
  while (T > 0.001) {
    if (M - N < 0.001) {
      out('FUEL OUT AT ' + L.toFixed(1) + ' SECS', 'warn');
      const S = (-V + Math.sqrt(V*V + 2*A*G)) / G;
      L += S;
      doLanding(V + G*S, 0, L);
      updateStats();
      return;
    }

    let S = T;
    if (K > 0 && M < N + S*K) S = (M - N) / K;

    const {I, J} = focalStep(A, V, M, K, S);

    if (I <= 0) {
      // Bisect to exact landing moment (FOCAL lines 07.x)
      let sa=A, sv=V, sm=M, sl=L, st=S;
      while (st > 0.005) {
        const denom = sv + Math.sqrt(sv*sv + 2*sa*(G - Z*K/sm));
        if (denom <= 0) break;
        st = 2*sa / denom;
        const r = focalStep(sa, sv, sm, K, st);
        sl+=st; sm-=K*st; sa=r.I; sv=r.J;
        if (sa <= 0) break;
      }
      L=sl; M=sm; A=Math.max(sa,0); V=sv;
      updateStats();
      doLanding(V, M-N, L);
      return;
    }

    L+=S; T-=S; M-=K*S; A=I; V=J;
  }

  blank();
  printStatus();
  updateStats();
  burnInput.focus();
}

// ── Numpad ───────────────────────────────────────────────────
function npPress(key) {
  if (gameOver) return;
  if (key === 'del') {
    burnInput.value = burnInput.value.slice(0,-1);
  } else {
    if (burnInput.value.length < 3) burnInput.value += key;
  }
}

burnInput.addEventListener('keydown', e => { if (e.key === 'Enter') submitBurn(); });
loadScoreboard();
initGame();
</script>
</body>
</html>
